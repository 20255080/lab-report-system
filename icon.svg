<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#2c3e50"/>
  
  <!-- Lab Flask Icon -->
  <g transform="translate(156, 80)">
    <!-- Flask body -->
    <path d="M 80 100 L 50 200 Q 40 240 50 280 L 150 280 Q 160 240 150 200 L 120 100 Z" 
          fill="#3498db" stroke="#ecf0f1" stroke-width="4"/>
    
    <!-- Flask neck -->
    <rect x="85" y="60" width="30" height="40" fill="#3498db" stroke="#ecf0f1" stroke-width="4"/>
    
    <!-- Flask top -->
    <rect x="75" y="50" width="50" height="15" rx="5" fill="#95a5a6" stroke="#ecf0f1" stroke-width="3"/>
    
    <!-- Liquid inside -->
    <path d="M 55 220 Q 45 250 55 270 L 145 270 Q 155 250 145 220 Z" 
          fill="#1abc9c" opacity="0.8"/>
    
    <!-- Bubbles -->
    <circle cx="80" cy="240" r="8" fill="#ecf0f1" opacity="0.6"/>
    <circle cx="110" cy="250" r="6" fill="#ecf0f1" opacity="0.6"/>
    <circle cx="95" cy="260" r="5" fill="#ecf0f1" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        fill="#ecf0f1" text-anchor="middle">BLESS</text>
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="36" 
        fill="#95a5a6" text-anchor="middle">Lab System</text>
</svg>
