<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    <title>BLESS Lab Report System</title>
    <meta name="description" content="연구실 업무 보고 및 시간표 관리 시스템">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLESS Lab">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/timetable.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW_KaEpbBhgyoTPvb_koMrntlInu35ak4",
            authDomain: "bless-lab.firebaseapp.com",
            projectId: "bless-lab",
            storageBucket: "bless-lab.firebasestorage.app",
            messagingSenderId: "492042770903",
            appId: "1:492042770903:web:d75a65938f9601b2f19392",
            measurementId: "G-0G6HQTLZ3L"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const storageRef = storage.ref();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/firebase-db.js"></script>
</head>
<body>
    <div class="app-root">

        <!-- ══ 앱 헤더 ══════════════════════════════════════ -->
        <header class="app-header">
            <div class="header-inner">
                <div class="header-title-group">
                    <span class="header-logo">🔬</span>
                    <div>
                        <div class="header-title">BLESS Lab</div>
                        <div class="header-subtitle">업무 보고 시스템</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- ══ 탭 메뉴 ══════════════════════════════════════ -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="submit" onclick="switchTab('submit')">
                <span class="tab-icon">✏️</span>
                <span class="tab-label">보고서 제출</span>
            </button>
            <button class="tab-btn" data-tab="viewall" onclick="switchTab('viewall')">
                <span class="tab-icon">📋</span>
                <span class="tab-label">전체 조회</span>
            </button>
            <button class="tab-btn" data-tab="timetable" onclick="switchTab('timetable')">
                <span class="tab-icon">📅</span>
                <span class="tab-label">시간표</span>
            </button>
            <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">
                <span class="tab-icon">🗓️</span>
                <span class="tab-label">캘린더</span>
            </button>
        </nav>

        <!-- ══ 탭 콘텐츠 ════════════════════════════════════ -->
        <main class="tab-content-area">

            <!-- ── 보고서 제출 탭 ─────────────────────────── -->
            <div id="tab-submit" class="tab-pane active">

                <!-- 일일/주간 서브탭 -->
                <div class="subtab-bar">
                    <button class="subtab-btn active" id="subtab-daily-btn" onclick="switchSubTab('daily')">일일 보고서</button>
                    <button class="subtab-btn" id="subtab-weekly-btn" onclick="switchSubTab('weekly')">주간 보고서</button>
                </div>

                <!-- 일일 보고서 -->
                <div id="subtab-daily" class="subtab-pane active">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">📝</span>
                            <h2 class="card-title">일일 업무 보고서</h2>
                        </div>
                        <div class="form-body">
                            <div class="form-row">
                                <label class="form-label">이름 <span class="required">*</span></label>
                                <select id="student-select" class="form-select">
                                    <option value="">선택하세요</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <label class="form-label">날짜 <span class="required">*</span></label>
                                <input type="date" id="report-date" class="form-input">
                            </div>
                            <div class="form-row">
                                <label class="form-label">업무 내용 <span class="required">*</span></label>
                                <textarea id="today-work" class="form-textarea" rows="7" placeholder="수행한 업무를 자세히 입력해주세요"></textarea>
                            </div>
                            <div class="form-row">
                                <label class="form-label">소요 시간 <span class="required">*</span></label>
                                <input type="text" id="work-hours" class="form-input" placeholder="예: 3시간, 오전 2h + 오후 4h">
                            </div>
                            <div class="form-row">
                                <label class="form-label">비고</label>
                                <textarea id="notes" class="form-textarea" rows="3" placeholder="특이사항이 있으면 입력해주세요"></textarea>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-primary" onclick="saveDailyReportFromForm()">💾 저장</button>
                                <button class="btn btn-secondary" onclick="loadTodayReport()">📂 불러오기</button>
                            </div>
                        </div>
                        <!-- 피드백 영역 -->
                        <div id="daily-feedback-area" class="feedback-area" style="display:none;">
                            <div class="feedback-header">
                                <span class="feedback-icon">💬</span>
                                <span class="feedback-title">교수님 피드백</span>
                            </div>
                            <div id="daily-feedback-list" class="feedback-list"></div>
                        </div>
                    </div>
                </div>

                <!-- 주간 보고서 -->
                <div id="subtab-weekly" class="subtab-pane">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">📊</span>
                            <h2 class="card-title">주간 업무 보고서</h2>
                        </div>
                        <div class="form-body">
                            <div class="form-row">
                                <label class="form-label">이름 <span class="required">*</span></label>
                                <select id="weekly-student-select" class="form-select">
                                    <option value="">선택하세요</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <label class="form-label">주 기준 날짜 <span class="required">*</span></label>
                                <input type="date" id="weekly-date" class="form-input">
                                <div class="form-hint" id="week-info"></div>
                            </div>
                            <div class="form-row">
                                <label class="form-label">주간 업무 요약 <span class="required">*</span></label>
                                <textarea id="weekly-summary" class="form-textarea" rows="8" placeholder="이번 주 수행한 주요 업무를 입력해주세요"></textarea>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-primary" onclick="saveWeeklySummaryFromForm()">💾 저장</button>
                                <button class="btn btn-secondary" onclick="loadThisWeekSummary()">📂 불러오기</button>
                            </div>
                        </div>
                        <!-- 피드백 영역 -->
                        <div id="weekly-feedback-area" class="feedback-area" style="display:none;">
                            <div class="feedback-header">
                                <span class="feedback-icon">💬</span>
                                <span class="feedback-title">교수님 피드백</span>
                            </div>
                            <div id="weekly-feedback-list" class="feedback-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── 전체 조회 탭 ─────────────────────────── -->
            <div id="tab-viewall" class="tab-pane">
                <div class="card">
                    <div class="card-header">
                        <span class="card-icon">🔍</span>
                        <h2 class="card-title">보고서 조회</h2>
                    </div>
                    <div class="form-body filter-form">
                        <div class="filter-row">
                            <div class="form-row flex-1">
                                <label class="form-label">구성원</label>
                                <select id="view-student-select" class="form-select">
                                    <option value="">전체 구성원</option>
                                </select>
                            </div>
                            <div class="form-row flex-1">
                                <label class="form-label">조회 유형</label>
                                <select id="view-type" class="form-select" onchange="onViewTypeChange()">
                                    <option value="daily">일일 보고서</option>
                                    <option value="weekly">주간 요약</option>
                                </select>
                            </div>
                        </div>
                        <div class="filter-row" id="date-filter-row">
                            <div class="form-row flex-1">
                                <label class="form-label">시작 날짜</label>
                                <input type="date" id="view-start-date" class="form-input">
                            </div>
                            <div class="form-row flex-1">
                                <label class="form-label">종료 날짜</label>
                                <input type="date" id="view-end-date" class="form-input">
                            </div>
                        </div>
                        <button class="btn btn-primary full-width" onclick="searchReports()">🔍 검색</button>
                    </div>
                </div>
                <div id="results-container">
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">검색 조건을 설정하고 검색 버튼을 눌러주세요.</div>
                    </div>
                </div>
            </div>

            <!-- ── 시간표 탭 ─────────────────────────────── -->
            <div id="tab-timetable" class="tab-pane">
                <div class="card">
                    <div class="card-header">
                        <span class="card-icon">📅</span>
                        <h2 class="card-title">BLESS 시간표 — 2026년 1학기</h2>
                    </div>
                    <div class="timetable-filter">
                        <label class="form-label">구성원 선택</label>
                        <select id="member-filter" class="form-select" onchange="renderTimetable(this.value)">
                            <option value="">전체 보기</option>
                        </select>
                    </div>
                    <div id="timetable-display" class="timetable-container"></div>
                </div>
            </div>

            <!-- ── 캘린더 탭 ─────────────────────────────── -->
            <div id="tab-calendar" class="tab-pane">
                <div class="card no-padding">
                    <div id="monthly-calendar"></div>
                </div>
            </div>

        </main>

        <!-- ══ 토스트 메시지 ════════════════════════════════ -->
        <div id="toast" class="toast"></div>

    </div>

    <script src="js/main-firebase.js"></script>
    <script src="js/timetable.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
