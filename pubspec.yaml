name: bless_lab
description: "BLESS Lab Work Report System - Biotechnology Laboratory for Environmental Sustainability and Survivability"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: 6.1.5+1

  # Firebase
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3

  # Local storage
  shared_preferences: 2.5.3

  # Utilities
  intl: ^0.19.0
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
